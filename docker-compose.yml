x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  api:
    build: .
    restart: unless-stopped
    # localhost only: access in prod via SSH tunnel
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      RAW_FOLDER: /ubki-data
      UBKI_DATA_FOLDER_PATH: /ubki-data/enriched
      DB_PATH: /data/ubki.sqlite3
    volumes:
      - ./data:/data
      - ${UBKI_DATA_FOLDER_PATH}:/ubki-data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

  scheduler:
    build: .
    restart: unless-stopped
    command: ["supercronic", "-json", "/srv/ubki-uploader/crontab"]
    env_file: .env
    environment:
      RAW_FOLDER: /ubki-data
      UBKI_DATA_FOLDER_PATH: /ubki-data/enriched
      DB_PATH: /data/ubki.sqlite3
    volumes:
      - ./data:/data
      - ${UBKI_DATA_FOLDER_PATH}:/ubki-data
    logging: *default-logging
